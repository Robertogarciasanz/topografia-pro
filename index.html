<!--

    ================================================
    Historial:
    v1.0 - EXIF GPS + mapa Leaflet satélite
    v1.1 - Promedio 20 lecturas GPS
    v1.2 - PDF con plano de parcela
    v1.3 - Fondo blanco en PDF · Una sola hoja A4
    v1.4 - Botón COORDS para entrada manual
    v1.5 - Botón MI GPS + PWA instalable
    v1.6 - Guía de ayuda Google Maps integrada
    v1.8 - COORDS pega las dos coordenadas juntas
    v1.8 - Plano en alta resolución 300dpi (A4)
           Plano JPG directo · Sin barra navegador móvil
    v2.0 - Eliminado botón FOTO · Añadido botón SEGUIRME
           Marcador azul de posición GPS en tiempo real
    ================================================
-->
<html>
<head>
    <title>Topografía Pro v2.0 - Roberto Garcia Sanz</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Topografía">
    <meta name="theme-color" content="#2c3e50">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; background: #2c3e50; }
        body { display: flex; flex-direction: column; }
        .controles { padding: 10px; display: flex; gap: 5px; flex-wrap: wrap; z-index: 1000; background: #2c3e50; }
        .autor { width:100%; color:#ecf0f1; font-size:.75em; padding:2px 4px 6px; letter-spacing:.5px; }
        #map { flex: 1; width: 100%; border-bottom: 2px solid #ddd; }
        #info { padding: 12px; background: white; z-index: 1000; max-height: 35%; overflow-y: auto; border-radius: 15px 15px 0 0; }

        .btn { border: none; padding: 12px 5px; border-radius: 6px; color: white; font-weight: bold; font-size: 12px; flex: 1; min-width: 80px; text-align: center; cursor: pointer; }
        .btn-seguir  { background: #16a085; }
        .btn-seguir.activo { background: #1abc9c; box-shadow: 0 0 0 3px rgba(26,188,156,0.5); }
        .btn-coord  { background: #f39c12; }
        .btn-add    { background: #3498db; }
        .btn-print  { background: #8e44ad; }
        .btn-borrar { background: #e74c3c; }

        #areaDisplay { font-size: 1.4em; font-weight: bold; color: #27ae60; display: block; }
        #status { font-size: 0.8em; color: #7f8c8d; margin-bottom: 5px; display: block; }

        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 8px; }
        th, td { border: 1px solid #ddd; padding: 4px; text-align: left; }
    </style>
</head>
<body>

<div class="controles">
    <div class="autor">📐 <strong>Topografía Pro</strong> &nbsp;·&nbsp; Roberto Garcia Sanz &nbsp;·&nbsp; v2.0</div>
    <button class="btn btn-seguir" id="btnSeguir" onclick="toggleSeguir()">🎯 POSICIÓN</button>
    <button class="btn btn-add"   onclick="manualPunto()">➕ PUNTO</button>
    <button class="btn btn-coord" onclick="ingresarCoordenadas()">📍 COORDS</button>
    <button class="btn btn-print" onclick="generarPlanoJPG()">💾 PLANO</button>
    <button class="btn btn-borrar" onclick="borrarTodo()">🗑️ RESET</button>
</div>

<div id="map"></div>

<div id="info">
    <span id="status">Esperando datos...</span>
    <span id="areaDisplay">0.00 m²</span>
    <table id="tablaCoord">
        <thead><tr><th>Nº</th><th>Latitud</th><th>Longitud</th><th>Fuente</th></tr></thead>
        <tbody id="cuerpoTabla"></tbody>
    </table>
</div>

<script>
    var map = L.map('map', { maxZoom: 22 }).setView([40, -3], 5);
    L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { maxZoom: 22, maxNativeZoom: 20 }).addTo(map);

    var marcadores = [], poligono = null;

    /* ── SEGUIRME: GPS en tiempo real con marcador arrastrable ── */
    var seguirActivo  = false;
    var watchId       = null;
    var marcadorGPS   = null;   // punto azul arrastrable
    var circuloGPS    = null;   // halo de precisión
    var gpsCongelado  = false;  // true cuando el usuario arrastra el punto

    function toggleSeguir() {
        if (!seguirActivo) {
            activarSeguir();
        } else {
            desactivarSeguir();
        }
    }

    function activarSeguir() {
        if (!navigator.geolocation) {
            alert("Tu dispositivo no soporta geolocalización.");
            return;
        }
        seguirActivo = true;
        gpsCongelado = false;
        document.getElementById('btnSeguir').classList.add('activo');
        document.getElementById('btnSeguir').innerText = '🎯 SIGUIENDO…';  // activo
        document.getElementById('status').innerText = '📡 Buscando señal GPS…';

        watchId = navigator.geolocation.watchPosition(
            function(pos) {
                var lat = pos.coords.latitude;
                var lon = pos.coords.longitude;
                var acc = pos.coords.accuracy;

                if (!marcadorGPS) {
                    // Crear halo de precisión
                    circuloGPS = L.circle([lat, lon], {
                        radius: acc,
                        color: '#2980b9',
                        fillColor: '#3498db',
                        fillOpacity: 0.12,
                        weight: 1,
                        interactive: false
                    }).addTo(map);

                    // Crear punto azul ARRASTRABLE
                    var iconGPS = L.divIcon({
                        className: '',
                        html: '<div title="Arrastra para ajustar posición" style="width:22px;height:22px;border-radius:50%;background:#3498db;border:3px solid white;box-shadow:0 0 10px rgba(52,152,219,0.9);cursor:grab;"></div>',
                        iconSize: [22, 22],
                        iconAnchor: [11, 11]
                    });
                    marcadorGPS = L.marker([lat, lon], {
                        icon: iconGPS,
                        draggable: true,
                        zIndexOffset: 1000
                    }).addTo(map);

                    // Al empezar a arrastrar: pausar actualizaciones GPS
                    marcadorGPS.on('dragstart', function() {
                        gpsCongelado = true;
                        document.getElementById('status').innerText = '✋ Ajustando posición…';
                    });

                    // Al soltar: la posición queda donde el usuario la dejó
                    // El halo se actualiza con la nueva posición manual
                    marcadorGPS.on('dragend', function() {
                        var ll = marcadorGPS.getLatLng();
                        circuloGPS.setLatLng(ll);
                        document.getElementById('status').innerText =
                            '📌 Posición ajustada · Pulsa ➕ PUNTO para fijar el vértice';
                    });

                    // Centrar mapa la primera vez
                    map.setView([lat, lon], Math.max(map.getZoom(), 19));
                } else if (!gpsCongelado) {
                    // Actualizar sólo si el usuario NO está arrastrando
                    marcadorGPS.setLatLng([lat, lon]);
                    circuloGPS.setLatLng([lat, lon]);
                    circuloGPS.setRadius(acc);
                    map.setView([lat, lon], Math.max(map.getZoom(), 19));
                }

                if (!gpsCongelado) {
                    document.getElementById('status').innerText =
                        '📡 GPS activo · Precisión: ±' + Math.round(acc) + ' m  · Arrastra el punto azul para ajustar';
                }
            },
            function(err) {
                document.getElementById('status').innerText = '⚠️ Error GPS: ' + err.message;
                desactivarSeguir();
            },
            { enableHighAccuracy: true, maximumAge: 2000, timeout: 10000 }
        );
    }

    function desactivarSeguir() {
        seguirActivo = false;
        gpsCongelado = false;
        if (watchId !== null) {
            navigator.geolocation.clearWatch(watchId);
            watchId = null;
        }
        if (marcadorGPS)  { map.removeLayer(marcadorGPS);  marcadorGPS  = null; }
        if (circuloGPS)   { map.removeLayer(circuloGPS);   circuloGPS   = null; }
        document.getElementById('btnSeguir').classList.remove('activo');
        document.getElementById('btnSeguir').innerText = '🎯 POSICIÓN';
        document.getElementById('status').innerText = 'Seguimiento GPS desactivado.';
    }

    /* ── COORDS: acepta pegar las dos juntas de Google Maps ── */
    function ingresarCoordenadas() {
        var input = prompt("Pega aquí las coordenadas de Google Maps\n(Ejemplo: 41.565692, -4.862055):");
        if (!input) return;
        var clean = input.trim();

        // Intentar separar por coma
        var partes = clean.split(',');
        if (partes.length === 2) {
            var lat = parseFloat(partes[0].trim());
            var lon = parseFloat(partes[1].trim());
            if (!isNaN(lat) && !isNaN(lon)) { nuevoMarcador(lat, lon, "Google Maps"); return; }
        }

        // Intentar separar por espacio
        var partesEsp = clean.split(/\s+/);
        if (partesEsp.length >= 2) {
            var lat = parseFloat(partesEsp[0].replace(',', '.'));
            var lon = parseFloat(partesEsp[1].replace(',', '.'));
            if (!isNaN(lat) && !isNaN(lon)) { nuevoMarcador(lat, lon, "Maps/Texto"); return; }
        }

        alert("Error: No reconozco las coordenadas.\nPega tal cual lo da Google Maps (ej: 41.56, -4.86).");
    }

    /* ── PUNTO MANUAL ── */
    function manualPunto() {
        // Si hay punto GPS activo (con o sin seguimiento), usar su posición ajustada
        if (marcadorGPS) {
            var ll = marcadorGPS.getLatLng();
            nuevoMarcador(ll.lat, ll.lng, "GPS");
            // Reactivar seguimiento GPS tras fijar el punto
            gpsCongelado = false;
            return;
        }
        // Si no hay GPS activo, usar el centro del mapa
        var centro = map.getCenter();
        nuevoMarcador(centro.lat, centro.lng, "Pantalla");
    }

    /* ── NUEVO MARCADOR ── */
    function nuevoMarcador(lat, lon, fuente) {
        var idx = marcadores.length;
        var label = String.fromCharCode(65 + idx);
        var icon = L.divIcon({
            className: '',
            html: '<div style="background:#e74c3c;color:#fff;font-weight:bold;font-size:12px;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4)">' + label + '</div>',
            iconSize: [26, 26], iconAnchor: [13, 13]
        });
        var m = L.marker([lat, lon], { draggable: true, icon: icon }).addTo(map);
        m._fuente = fuente;
        m.on('dragend', calcularTodo);
        m.on('click', function() {
            if (confirm("¿Borrar punto " + label + "?")) {
                map.removeLayer(m);
                marcadores = marcadores.filter(function(i) { return i !== m; });
                reconstruirIconos();
                calcularTodo();
            }
        });
        marcadores.push(m);
        calcularTodo();
        map.flyTo([lat, lon], 19);
        document.getElementById('status').innerText = 'Punto ' + label + ' añadido.';
    }

    /* ── REASIGNAR LETRAS ── */
    function reconstruirIconos() {
        marcadores.forEach(function(m, idx) {
            var label = String.fromCharCode(65 + idx);
            m.setIcon(L.divIcon({
                className: '',
                html: '<div style="background:#e74c3c;color:#fff;font-weight:bold;font-size:12px;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4)">' + label + '</div>',
                iconSize: [26, 26], iconAnchor: [13, 13]
            }));
        });
    }

    /* ── CALCULAR ÁREA ── */
    function calcularTodo() {
        var p = marcadores.map(function(m) { return m.getLatLng(); });
        var html = "";
        p.forEach(function(pt, i) {
            var fuente = marcadores[i]._fuente || '—';
            var label  = String.fromCharCode(65 + i);
            html += '<tr><td>' + label + '</td><td>' + pt.lat.toFixed(6) + '</td><td>'
                  + pt.lng.toFixed(6) + '</td><td>' + fuente + '</td></tr>';
        });
        document.getElementById('cuerpoTabla').innerHTML = html;

        if (poligono) map.removeLayer(poligono);
        if (p.length > 2) {
            poligono = L.polygon(p, { color: 'yellow', weight: 4, fillOpacity: 0.3 }).addTo(map);
            var area = 0, r = 6378137;
            for (var i = 0; i < p.length; i++) {
                var p1 = p[i], p2 = p[(i + 1) % p.length];
                area += (p2.lng - p1.lng) * Math.PI / 180
                      * (2 + Math.sin(p1.lat * Math.PI / 180) + Math.sin(p2.lat * Math.PI / 180));
            }
            var areaM2 = Math.abs(area * r * r / 2);
            document.getElementById('areaDisplay').innerText =
                areaM2.toLocaleString('es-ES', { maximumFractionDigits: 2 }) + ' m²  ·  '
                + (areaM2 / 10000).toFixed(4) + ' ha';
        } else {
            document.getElementById('areaDisplay').innerText = '0.00 m²';
        }
    }

    /* ── PLANO PDF profesional (jsPDF + tiles satélite) ── */
    function generarPlanoJPG() {
        if (marcadores.length < 2) {
            alert("Añade al menos 2 puntos para generar el plano.");
            return;
        }
        document.getElementById('status').innerText = '⏳ Cargando jsPDF…';

        // Cargar jsPDF dinámicamente si no está cargado
        if (typeof window.jspdf === 'undefined') {
            var s = document.createElement('script');
            s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
            s.onload = function() { _generarPDF(); };
            s.onerror = function() { alert('Error cargando jsPDF. Comprueba la conexión.'); };
            document.head.appendChild(s);
        } else {
            _generarPDF();
        }
    }

    function _generarPDF() {
        document.getElementById('status').innerText = '⏳ Encuadrando parcela…';

        var group = L.featureGroup(marcadores);
        map.fitBounds(group.getBounds().pad(0.25));

        setTimeout(function() {
            var bounds = group.getBounds();
            var zoom   = Math.min(map.getBoundsZoom(bounds.pad(0.25)), 20);

            // ── Calcular tiles necesarios ──
            function ll2tile(lat, lng, z) {
                var n = Math.pow(2, z);
                return {
                    x: Math.floor((lng + 180) / 360 * n),
                    y: Math.floor((1 - Math.log(Math.tan(lat*Math.PI/180) + 1/Math.cos(lat*Math.PI/180))/Math.PI)/2 * n)
                };
            }
            var nw  = bounds.getNorthWest(), se = bounds.getSouthEast();
            var tNW = ll2tile(nw.lat, nw.lng, zoom);
            var tSE = ll2tile(se.lat, se.lng, zoom);
            tNW.x -= 1; tNW.y -= 1;
            tSE.x += 1; tSE.y += 1;

            var TILE   = 256;
            var tilesX = tSE.x - tNW.x + 1;
            var tilesY = tSE.y - tNW.y + 1;

            // Canvas del mapa
            var mc  = document.createElement('canvas');
            mc.width  = tilesX * TILE;
            mc.height = tilesY * TILE;
            var mCtx = mc.getContext('2d');
            mCtx.fillStyle = '#ccc';
            mCtx.fillRect(0, 0, mc.width, mc.height);

            // Función coordenada → pixel en el canvas del mapa
            function ll2px(lat, lng) {
                var n  = Math.pow(2, zoom);
                var tx = (lng + 180) / 360 * n;
                var ty = (1 - Math.log(Math.tan(lat*Math.PI/180) + 1/Math.cos(lat*Math.PI/180))/Math.PI)/2 * n;
                return { x: (tx - tNW.x)*TILE, y: (ty - tNW.y)*TILE };
            }

            // Descargar todos los tiles
            var total = tilesX * tilesY, cargados = 0;
            for (var tx = tNW.x; tx <= tSE.x; tx++) {
                for (var ty2 = tNW.y; ty2 <= tSE.y; ty2++) {
                    (function(tx2, ty3) {
                        var img = new Image();
                        img.crossOrigin = 'anonymous';
                        img.onload = function() {
                            mCtx.drawImage(img, (tx2-tNW.x)*TILE, (ty3-tNW.y)*TILE);
                            cargados++;
                            document.getElementById('status').innerText =
                                '⏳ Tiles ' + cargados + '/' + total + '…';
                            if (cargados === total) dibujarYExportar();
                        };
                        img.onerror = function() {
                            cargados++;
                            if (cargados === total) dibujarYExportar();
                        };
                        img.src = 'https://mt1.google.com/vt/lyrs=s&x='+tx2+'&y='+ty3+'&z='+zoom;
                    })(tx, ty2);
                }
            }

            function dibujarYExportar() {
                document.getElementById('status').innerText = '✏️ Dibujando polígono…';
                var p = marcadores.map(function(m) { return m.getLatLng(); });

                // Polígono amarillo
                if (p.length > 2) {
                    var pts = p.map(function(ll) { return ll2px(ll.lat, ll.lng); });
                    mCtx.beginPath();
                    mCtx.moveTo(pts[0].x, pts[0].y);
                    for (var i=1; i<pts.length; i++) mCtx.lineTo(pts[i].x, pts[i].y);
                    mCtx.closePath();
                    mCtx.strokeStyle = '#f1c40f'; mCtx.lineWidth = 6; mCtx.stroke();
                    mCtx.fillStyle = 'rgba(241,196,15,0.18)'; mCtx.fill();
                } else if (p.length === 2) {
                    var pts = p.map(function(ll) { return ll2px(ll.lat, ll.lng); });
                    mCtx.beginPath(); mCtx.moveTo(pts[0].x,pts[0].y); mCtx.lineTo(pts[1].x,pts[1].y);
                    mCtx.strokeStyle = '#f1c40f'; mCtx.lineWidth = 6; mCtx.stroke();
                }

                // Distancias en lados
                for (var i=0; i<p.length; i++) {
                    var j = (i+1) % p.length;
                    if (p.length < 3 && j === 0) continue;
                    var pt1 = ll2px(p[i].lat, p[i].lng), pt2 = ll2px(p[j].lat, p[j].lng);
                    var mx  = (pt1.x+pt2.x)/2, my = (pt1.y+pt2.y)/2;
                    var R=6371000, dLat=(p[j].lat-p[i].lat)*Math.PI/180, dLon=(p[j].lng-p[i].lng)*Math.PI/180;
                    var a = Math.sin(dLat/2)*Math.sin(dLat/2) +
                            Math.cos(p[i].lat*Math.PI/180)*Math.cos(p[j].lat*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
                    var dist = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                    mCtx.font = 'bold 20px sans-serif';
                    mCtx.strokeStyle = 'rgba(255,255,255,1)'; mCtx.lineWidth = 5;
                    mCtx.strokeText(dist.toFixed(1)+' m', mx, my-10);
                    mCtx.fillStyle = '#1a252f';
                    mCtx.fillText(dist.toFixed(1)+' m', mx, my-10);
                }

                // Marcadores A B C…
                p.forEach(function(ll, i) {
                    var pt = ll2px(ll.lat, ll.lng), lbl = String.fromCharCode(65+i);
                    mCtx.beginPath(); mCtx.arc(pt.x, pt.y, 18, 0, Math.PI*2);
                    mCtx.fillStyle = '#e74c3c'; mCtx.fill();
                    mCtx.strokeStyle = '#fff'; mCtx.lineWidth = 3; mCtx.stroke();
                    mCtx.font = 'bold 18px sans-serif'; mCtx.fillStyle = '#fff';
                    mCtx.textAlign = 'center'; mCtx.textBaseline = 'middle';
                    mCtx.fillText(lbl, pt.x, pt.y);
                });

                // Norte
                mCtx.font = 'bold 24px sans-serif'; mCtx.fillStyle = '#fff';
                mCtx.textAlign = 'left'; mCtx.textBaseline = 'top';
                mCtx.strokeStyle = 'rgba(0,0,0,0.7)'; mCtx.lineWidth = 5;
                mCtx.strokeText('N ↑', 18, 18); mCtx.fillText('N ↑', 18, 18);

                // ── Generar PDF con jsPDF ──
                document.getElementById('status').innerText = '📄 Generando PDF…';
                var { jsPDF } = window.jspdf;
                var doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });

                var PW = 297, PH = 210; // A4 landscape mm
                var M  = 8;             // margen

                // Cabecera
                doc.setFillColor(44, 62, 80);
                doc.rect(0, 0, PW, 16, 'F');
                doc.setTextColor(255,255,255);
                doc.setFontSize(13); doc.setFont('helvetica','bold');
                doc.text('Topografía Pro v2.0', M, 10.5);
                doc.setFontSize(10); doc.setFont('helvetica','normal');
                doc.text('Técnico: Roberto Garcia Sanz', 90, 10.5);
                doc.setFontSize(10);
                doc.text(new Date().toLocaleDateString('es-ES'), PW - M, 10.5, {align:'right'});

                // Mapa como imagen (ocupa la parte superior)
                var filas   = marcadores.length;
                var tablaH  = 14 + 7 + (filas * 7) + 6;  // mm
                var mapaH   = PH - 16 - M - tablaH - 4;  // mm disponibles
                var mapaY   = 18;

                // Recortar el canvas del mapa al área de la parcela (sin tiles de más)
                var pxNW = ll2px(nw.lat, nw.lng);
                var pxSE = ll2px(se.lat, se.lng);
                var pad  = TILE; // 1 tile de padding visual
                var cx   = Math.max(0, pxNW.x - pad);
                var cy   = Math.max(0, pxNW.y - pad);
                var cw   = Math.min(mc.width,  pxSE.x + pad) - cx;
                var ch   = Math.min(mc.height, pxSE.y + pad) - cy;

                // Sub-canvas recortado
                var crop = document.createElement('canvas');
                crop.width = cw; crop.height = ch;
                crop.getContext('2d').drawImage(mc, cx, cy, cw, ch, 0, 0, cw, ch);

                var mapImgData = crop.toDataURL('image/jpeg', 0.95);
                var mapaW      = PW - M*2;
                // Mantener proporción
                var propH = (ch / cw) * mapaW;
                if (propH > mapaH) { mapaW = (cw/ch)*mapaH; }
                var mapaHFinal = Math.min(propH, mapaH);

                doc.addImage(mapImgData, 'JPEG', M, mapaY, mapaW, mapaHFinal);
                doc.setDrawColor(80,80,80); doc.setLineWidth(0.3);
                doc.rect(M, mapaY, mapaW, mapaHFinal);

                // ── Tabla vectorial ──
                var ty = mapaY + mapaHFinal + 5;

                // Área
                var areaText = document.getElementById('areaDisplay').innerText;
                doc.setFontSize(12); doc.setFont('helvetica','bold');
                doc.setTextColor(44,62,80);
                doc.text('Superficie: ', M, ty);
                doc.setTextColor(39,174,96);
                doc.text(areaText, M + 28, ty);
                ty += 8;

                // Cabecera tabla
                doc.setFillColor(44, 62, 80);
                doc.rect(M, ty, PW - M*2, 7, 'F');
                doc.setTextColor(255,255,255);
                doc.setFontSize(9); doc.setFont('helvetica','bold');
                var cols = [M+2, M+20, M+60, M+100, M+140];
                ['Vért.','Latitud','Longitud','Fuente'].forEach(function(h,i){
                    doc.text(h, cols[i], ty+5);
                });
                ty += 7;

                // Filas
                doc.setFont('helvetica','normal'); doc.setFontSize(9);
                marcadores.forEach(function(m, i) {
                    var ll  = m.getLatLng(), lbl = String.fromCharCode(65+i);
                    if (i%2===0) {
                        doc.setFillColor(245,245,245);
                        doc.rect(M, ty, PW-M*2, 7, 'F');
                    }
                    doc.setTextColor(50,50,50);
                    [lbl, ll.lat.toFixed(6), ll.lng.toFixed(6), m._fuente||'—']
                        .forEach(function(v,c){ doc.text(v, cols[c], ty+5); });
                    ty += 7;
                });

                // Pie
                doc.setFontSize(7); doc.setTextColor(150,150,150);
                doc.text('Topografía Pro v2.0 · Roberto Garcia Sanz · topografia-pro.html',
                    PW/2, PH - 3, {align:'center'});

                // ── Guardar / abrir PDF ──
                var pdfBlob = doc.output('blob');
                var url     = URL.createObjectURL(pdfBlob);
                var win     = window.open(url, '_blank');
                if (!win) {
                    // Fallback descarga directa
                    var a = document.createElement('a');
                    a.href = url;
                    a.download = 'parcela_' + new Date().toISOString().slice(0,10) + '.pdf';
                    a.click();
                }
                document.getElementById('status').innerText = '✅ PDF generado correctamente.';
            }
        }, 900);
    }

    /* ── RESET ── */
    function borrarTodo() {
        if (confirm("¿Borrar todo?")) {
            marcadores.forEach(function(m) { map.removeLayer(m); });
            marcadores = [];
            if (poligono) { map.removeLayer(poligono); poligono = null; }
            if (seguirActivo) desactivarSeguir();
            calcularTodo();
            map.setView([40, -3], 5);
            document.getElementById('status').innerText = 'Borrados';
        }
    }
</script>
</body>
</html>
